<div class="d-flex justify-content-center">
  <div class="col-8">
    <div *ngIf="task">
      <h2 data-cy="taskDetailsHeading"><span jhiTranslate="habitForgeApp.task.detail.title">Task</span></h2>

      <hr />

      <jhi-alert-error></jhi-alert-error>

      <jhi-alert></jhi-alert>

      <dl class="row-md jh-entity-details">
        <dt><span jhiTranslate="global.field.id">ID</span></dt>
        <dd>
          <span>{{ task.id }}</span>
        </dd>
        <dt><span jhiTranslate="habitForgeApp.task.name">Name</span></dt>
        <dd>
          <span>{{ task.name }}</span>
        </dd>
        <dt><span jhiTranslate="habitForgeApp.task.description">Description</span></dt>
        <dd>
          <span>{{ task.description }}</span>
        </dd>
        <dt><span jhiTranslate="habitForgeApp.task.startDate">Start Date</span></dt>
        <dd>
          <span>{{ task.startDate | formatMediumDate }}</span>
        </dd>
        <dt><span jhiTranslate="habitForgeApp.task.streak">Streak</span></dt>
        <dd>
          <span>{{ task.streak }}</span>
        </dd>
        <dt><span jhiTranslate="habitForgeApp.task.targetStreak">Target Streak</span></dt>
        <dd>
          <span>{{ task.targetStreak }}</span>
        </dd>
        <dt><span jhiTranslate="habitForgeApp.task.userProfile">User Profile</span></dt>
        <dd>
          <div *ngIf="task.userProfile">
            <a [routerLink]="['/user-profile', task.userProfile.id, 'view']">{{ task.userProfile.id }}</a>
          </div>
        </dd>
      </dl>

      <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
        <fa-icon icon="arrow-left"></fa-icon>&nbsp;<span jhiTranslate="entity.action.back">Back</span>
      </button>

      <button type="button" [routerLink]="['/task', task.id, 'edit']" class="btn btn-primary">
        <fa-icon icon="pencil-alt"></fa-icon>&nbsp;<span jhiTranslate="entity.action.edit">Edit</span>
      </button>
    </div>
  </div>
</div>
